<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stars"></div>
<div class="topbar">
<h2 id="greet">Welcome 👋</h2>
<button onclick="toggleDarkMode()">🌙 Theme</button>
</div>
<div class="container">
<div id="fieldSection">
<h1>Choose Your Interview Domain</h1>
<div class="grid">
<button onclick="startInterview('Python')">Python</button>
<button onclick="startInterview('Java')">Java</button>
<button onclick="startInterview('SQL')">SQL</button>
<button onclick="startInterview('HTML')">HTML</button>
<button onclick="startInterview('CSS')">CSS</button>
<button onclick="startInterview('JavaScript')">JavaScript</button>
<button onclick="startInterview('React')">React</button>
<button onclick="startInterview('Node')">Node.js</button>
<button onclick="startInterview('Flask')">Flask</button>
<button onclick="startInterview('MySQL')">MySQL</button>
<button onclick="startInterview('Cloud')">Cloud</button>
<button onclick="startInterview('Linux')">Linux</button>
<button onclick="startInterview('Testing')">Testing</button>
<button onclick="startInterview('HR')">HR</button>
<button onclick="startInterview('DataScience')">Data Science</button>
</div>
</div>
<div id="interviewSection" class="hidden glass">
<button onclick="goBack()">⬅ Back</button>
<h2 id="timer">Time: 30</h2>
<h3 id="progress"></h3>
<h2 id="question"></h2>
<textarea id="answer" placeholder="Type your answer..."></textarea>
<div class="row">
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="submitAnswer()">Submit</button>
</div>
<p id="result"></p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
